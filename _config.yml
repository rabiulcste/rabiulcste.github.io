# Site settings
title: "Rabiul Awal"
SEOTitle: Rabiul Awal
header-img: ""
email: rabiul.awal@mila.quebec
description: "PhD student at Mila — vision & language, multimodal learning."
url: "https://rabiul.me"              # your host, for absolute URL
baseurl: ""                             # for example, '/blog' if your blog hosted on 'host/blog'

# Publish posts or collection documents with a future date.
future: true

# SNS settings
github_username:    rabiulcste
twitter_username:   _rabiulawal
linkedin_username:  rabiulawal


# Pagination
pagination:
  enabled: true

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
exclude: ["less","node_modules","Gruntfile.js","package.json","package-lock.json","scripts","README.md","README.zh.md","screenshots"]
anchorjs: true

# Gems
plugins:
  - jekyll-archives
  - jekyll-feed
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-sitemap
  - jekyll-target-blank



# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM                            # use Github Flavored Markdown !important
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1



# Disqus settings
disqus_username: rabiul-me

# OG / theme (sidebar-avatar used as default share image in head.html)
sidebar-avatar: https://github.com/rabiulcste.png

# Progressive Web Apps
chrome-tab-theme-color: "#fbfbfd"